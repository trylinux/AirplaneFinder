[pytest]
# Run from project root: ``pytest``
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Quiet by default; -v shows the full list. Stop on first failure with -x.
addopts = -ra --strict-markers --color=yes

# Suppress noise from libraries we don't control.
filterwarnings =
    ignore::DeprecationWarning:flask_sqlalchemy.*
    ignore::DeprecationWarning:flask_limiter.*

# Custom markers (see tests/conftest.py).
markers =
    slow: tests that hit the network or are otherwise expensive
    integration: tests that exercise multiple subsystems via the test client
