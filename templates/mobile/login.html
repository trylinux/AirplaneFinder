{% extends "mobile/base.html" %}
{% block title %}Sign in — Aircraft Finder{% endblock %}

{% block content %}
<div class="m-page-header">
    <h1><i class="fa-solid fa-right-to-bracket"></i> Sign in</h1>
</div>

<div class="m-card">
    <form method="POST" action="{{ url_for('login_page') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="m-field">
            <label>Username</label>
            <input type="text" name="username" required autocomplete="username" autocapitalize="none">
        </div>
        <div class="m-field">
            <label>Password</label>
            <input type="password" name="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="m-btn">
            <i class="fa-solid fa-right-to-bracket"></i> Sign in
        </button>
    </form>
</div>

<p style="text-align:center; font-size:.85rem; color:var(--text-dim); margin-top:.6rem;">
    No account? <a href="{{ url_for('register_page') }}">Register</a>
</p>
{% endblock %}
