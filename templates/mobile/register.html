{% extends "mobile/base.html" %}
{% block title %}Register — Aircraft Finder{% endblock %}

{% block content %}
<div class="m-page-header">
    <h1><i class="fa-solid fa-user-plus"></i> Create account</h1>
</div>

<div class="m-card">
    <form method="POST" action="{{ url_for('register_page') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="m-field">
            <label>Username</label>
            <input type="text" name="username" required autocomplete="username" autocapitalize="none">
        </div>
        <div class="m-field">
            <label>Email (optional)</label>
            <input type="email" name="email" autocomplete="email" autocapitalize="none">
        </div>
        <div class="m-field">
            <label>Password</label>
            <input type="password" name="password" required autocomplete="new-password">
        </div>
        <div class="m-field">
            <label>Confirm password</label>
            <input type="password" name="password2" required autocomplete="new-password">
        </div>

        <button type="submit" class="m-btn">
            <i class="fa-solid fa-user-plus"></i> Create account
        </button>
    </form>
</div>

<p style="text-align:center; font-size:.85rem; color:var(--text-dim); margin-top:.6rem;">
    Already have one? <a href="{{ url_for('login_page') }}">Sign in</a>
</p>
{% endblock %}
