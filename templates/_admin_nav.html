{# Shared admin sub-navigation. Set `admin_section` in the child template. #}
<div class="page-header">
    <div class="page-header-row">
        <div>
            <h1>Admin Panel</h1>
            <p class="subtitle">Logged in as <strong>{{ current_user.username }}</strong>
                <span class="badge status-on_display">{{ current_user.role }}</span>
            </p>
        </div>
        <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
            <a href="/account" class="btn btn-secondary"><i class="fa-solid fa-user"></i> My Account</a>
            <a href="/admin/api-keys" class="btn btn-secondary"><i class="fa-solid fa-key"></i> API Keys</a>
        </div>
    </div>
</div>

<div class="tab-nav" style="margin-top: 1.5rem;">
    <a href="/admin" class="tab-btn {% if admin_section == 'dashboard' %}active{% endif %}" style="text-decoration:none;">
        <i class="fa-solid fa-gauge"></i> Dashboard
    </a>
    <a href="/admin/aircraft" class="tab-btn {% if admin_section == 'aircraft' %}active{% endif %}" style="text-decoration:none;">
        <i class="fa-solid fa-jet-fighter"></i> Aircraft
    </a>
    <a href="/admin/museums" class="tab-btn {% if admin_section == 'museums' %}active{% endif %}" style="text-decoration:none;">
        <i class="fa-solid fa-building-columns"></i> Museums
    </a>
    <a href="/admin/templates" class="tab-btn {% if admin_section == 'templates' %}active{% endif %}" style="text-decoration:none;">
        <i class="fa-solid fa-clone"></i> Templates
    </a>
    <a href="/admin/import" class="tab-btn {% if admin_section == 'import' %}active{% endif %}" style="text-decoration:none;">
        <i class="fa-solid fa-upload"></i> Bulk Import
    </a>
    {% if current_user.is_admin %}
    <a href="/admin/users" class="tab-btn {% if admin_section == 'users' %}active{% endif %}" style="text-decoration:none;">
        <i class="fa-solid fa-users-gear"></i> Users
    </a>
    {% endif %}
</div>
